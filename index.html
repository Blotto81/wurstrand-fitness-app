<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wurstrand Challenge</title>
  <style>
    :root{
      --bg:#0b1120;
      --bg2:#111827;
      --card:#111827;
      --card2:#1f2937;
      --line:#334155;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --green:#22c55e;
      --green2:#84cc16;
      --blue:#38bdf8;
      --violet:#a78bfa;
      --pink:#f472b6;
      --orange:#f59e0b;
      --red:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#020617,#0f172a);
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }

    .hero,
    .card,
    .tabbar{
      background:rgba(17,24,39,.92);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    .hero{
      padding:24px;
      margin-bottom:18px;
    }

    .topline{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:end;
      flex-wrap:wrap;
    }

    h1,h2,h3,p{margin:0}
    .sub{color:var(--muted);margin-top:8px}

    .hero-badge{
      background:#1e293b;
      color:#e2e8f0;
      border:1px solid #334155;
      padding:12px 16px;
      border-radius:16px;
      font-size:14px;
    }

    .overlay{
      margin-top:18px;
      padding:22px;
      border-radius:22px;
      background:linear-gradient(135deg,#111827,#374151);
      border:1px solid #475569;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      padding:6px 12px;
      font-size:12px;
      font-weight:700;
      color:#e5e7eb;
      margin-bottom:12px;
    }

    .challenge-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:end;
      flex-wrap:wrap;
    }

    label{
      display:block;
      font-size:14px;
      color:#e2e8f0;
      margin-bottom:6px;
    }

    select,input{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#0f172a;
      color:var(--text);
      outline:none;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .grid-4{grid-template-columns:repeat(4,1fr)}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-2{grid-template-columns:repeat(2,1fr)}

    .mini{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
    }

    .mini .label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:#cbd5e1;
    }
