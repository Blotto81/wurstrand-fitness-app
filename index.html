<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wurstrand Challenge</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:#f8fafc;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.hero{
  background:rgba(17,24,39,.95);
  border:1px solid #334155;
  border-radius:22px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
  margin:0;
  font-size:32px;
}

.sub{
  color:#94a3b8;
  margin-top:5px;
}

/* OVERLAY */
.overlay{
  margin-top:20px;
  padding:25px;
  border-radius:22px;
  background:linear-gradient(135deg,#111827,#1f2937);
  border:1px solid #475569;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:#1e293b;
  font-size:12px;
  margin-bottom:15px;
}

.challenge-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.progress-bar{
  height:14px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

.progress{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#84cc16);
  transition:.3s;
}

/* GRID */
.grid{
  display:grid;
  gap:15px;
  margin-top:20px;
}

.grid-4{
  grid-template-columns:repeat(4,1fr);
}

.mini{
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  text-align:center;
  font-size:18px;
}

/* FORM */
.card{
  margin-top:25px;
  padding:25px;
  border-radius:22px;
  background:#111827;
  border:1px solid #334155;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:14px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>
<div class="wrap">

<div class="hero">
  <h1>🔥 Wurstrand Challenge</h1>
  <div class="sub">Gemeinsam stärker. Jeden Tag.</div>

  <div class="overlay">

    <div class="badge">APRIL CHALLENGE</div>

    <div class="challenge-row">
      <div>
        <h2 id="points">0 / 1600 Punkte</h2>
        <div id="percent">0%</div>
      </div>
      <div>🏁 Ziel: 1600</div>
    </div>

    <div class="progress-bar">
      <div id="bar" class="progress" style="width:0%"></div>
    </div>

    <div class="grid grid-4">
      <div class="mini">👣<br><span id="steps">0</span></div>
      <div class="mini">🚴<br><span id="bike">0</span></div>
      <div class="mini">💪<br><span id="kraft">0</span></div>
      <div class="mini">🎁<br><span id="bonus">0</span></div>
    </div>

  </div>

  <div class="card">
    <h3>Eintrag</h3>

    <input type="date" id="date">
    
    <select id="person">
      <option>Thorsten</option>
      <option>Basti</option>
      <option>Marian</option>
      <option>Fabi</option>
    </select>

    <input type="number" id="stepsInput" placeholder="Schritte">
    <input type="number" id="bikeInput" placeholder="Rad KM">
    <input type="number" id="squatInput" placeholder="Kniebeugen">
    <input type="number" id="pushInput" placeholder="Liegestütze">

    <label><input type="checkbox" id="bonusInput"> Bonus</label>

    <button onclick="add()">Speichern</button>
  </div>

</div>
</div>

<script>
let data=[];

function calc(e){
  return Math.floor(e.steps/1000)
    + e.bike
    + Math.floor(e.squats/5)
    + Math.floor(e.pushups/3)
    + (e.bonus?4:0);
}

function add(){
  const e={
    steps:+stepsInput.value||0,
    bike:+bikeInput.value||0,
    squats:+squatInput.value||0,
    pushups:+pushInput.value||0,
    bonus:bonusInput.checked
  };
  data.push(e);
  update();
}

function update(){
  let steps=data.reduce((a,b)=>a+b.steps,0);
  let bike=data.reduce((a,b)=>a+b.bike,0);
  let kraft=data.reduce((a,b)=>a+b.squats+b.pushups,0);
  let bonus=data.filter(e=>e.bonus).length;

  let pts=data.reduce((a,b)=>a+calc(b),0);
  let goal=1600;
  let p=Math.round(pts/goal*100);

  stepsEl.innerText=steps;
  bikeEl.innerText=bike;
  kraftEl.innerText=kraft;
  bonusEl.innerText=bonus;

  document.getElementById("points").innerText=pts+" / "+goal;
  document.getElementById("percent").innerText=p+"%";
  document.getElementById("bar").style.width=p+"%";
}

const stepsEl=document.getElementById("steps");
const bikeEl=document.getElementById("bike");
const kraftEl=document.getElementById("kraft");
const bonusEl=document.getElementById("bonus");
</script>

</body>
</html>
