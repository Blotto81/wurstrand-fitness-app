<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Wurstrand Challenge</title>
</head>

<body style="background:#111; color:white; font-family:Arial; padding:20px;">

<h1>🔥 Wurstrand Challenge</h1>

<h2>Eintrag hinzufügen</h2>

Datum: <input type="date" id="date"><br><br>
Person:
<select id="person">
  <option>Thorsten</option>
  <option>Basti</option>
  <option>Marian</option>
  <option>Fabi</option>
</select><br><br>

Schritte: <input type="number" id="steps"><br><br>
Rad KM: <input type="number" id="bike"><br><br>
Kniebeugen: <input type="number" id="squats"><br><br>
Liegestütze: <input type="number" id="pushups"><br><br>

Bonus: <input type="checkbox" id="bonus"><br><br>

<button onclick="addEntry()">Speichern</button>

<hr>

<h2>Einträge</h2>
<div id="list"></div>

<hr>

<h2>Statistik</h2>
Gesamt Schritte: <span id="totalSteps">0</span><br>
Gesamt Rad KM: <span id="totalBike">0</span><br>
Gesamt Punkte: <span id="totalPoints">0</span><br>

<script>
let data = [];

function addEntry(){
  const entry = {
    date: document.getElementById("date").value,
    person: document.getElementById("person").value,
    steps: Number(document.getElementById("steps").value) || 0,
    bike: Number(document.getElementById("bike").value) || 0,
    squats: Number(document.getElementById("squats").value) || 0,
    pushups: Number(document.getElementById("pushups").value) || 0,
    bonus: document.getElementById("bonus").checked
  };

  entry.points =
    entry.steps / 1000 +
    entry.bike +
    entry.squats / 5 +
    entry.pushups / 3 +
    (entry.bonus ? 4 : 0);

  data.push(entry);
  render();
}

function render(){
  let totalSteps = 0;
  let totalBike = 0;
  let totalPoints = 0;

  const list = data.map(e => {
    totalSteps += e.steps;
    totalBike += e.bike;
    totalPoints += e.points;

    return `
      <div style="margin-bottom:10px; border-bottom:1px solid #444;">
        ${e.date} - ${e.person}<br>
        Schritte: ${e.steps} | Rad: ${e.bike} | Punkte: ${e.points.toFixed(2)}
      </div>
    `;
  }).join("");

  document.getElementById("list").innerHTML = list;

  document.getElementById("totalSteps").innerText = totalSteps;
  document.getElementById("totalBike").innerText = totalBike;
  document.getElementById("totalPoints").innerText = totalPoints.toFixed(2);
}
</script>

</body>
</html>
