<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wurstrand Challenge</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(#020617,#0f172a);
  color:white;
}

.wrap {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero {
  background:#111827;
  padding:20px;
  border-radius:20px;
  border:1px solid #334155;
}

h1 { margin:0; }

.overlay {
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#111827,#374151);
  border:1px solid #475569;
}

.badge {
  background:#1e293b;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
}

.challenge-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.progress-bar {
  height:12px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress {
  height:100%;
  background:linear-gradient(90deg,#22c55e,#84cc16);
}

.grid {
  display:grid;
  gap:10px;
  margin-top:20px;
}

.grid-4 {
  grid-template-columns: repeat(4,1fr);
}

.mini {
  background:#1f2937;
  padding:10px;
  border-radius:12px;
  border:1px solid #334155;
}

.tabs {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:8px 12px;
  border-radius:10px;
  background:#1f2937;
  cursor:pointer;
}

.active {
  background:#22c55e;
}

.card {
  margin-top:20px;
  padding:20px;
  background:#111827;
  border-radius:20px;
  border:1px solid #334155;
}

input, select {
  padding:8px;
  border-radius:10px;
  border:none;
  width:100%;
  margin-top:5px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="wrap">

<!-- HEADER -->
<div class="hero">
  <h1>🔥 Wurstrand Challenge</h1>
  <p>Gemeinsam stärker. Jeden Tag.</p>

  <!-- OVERLAY -->
  <div class="overlay">

    <div class="badge">APRIL CHALLENGE</div>

    <div class="challenge-row">
      <div>
        <h2 id="zielText">0 / 1600 Punkte</h2>
        <div id="percent">0%</div>
      </div>
      <div>🏁 Ziel: 1600</div>
    </div>

    <div class="progress-bar">
      <div id="bar" class="progress" style="width:0%"></div>
    </div>

    <div class="grid grid-4">
      <div class="mini">👣 Schritte<br><span id="steps">0</span></div>
      <div class="mini">🚴 KM<br><span id="bike">0</span></div>
      <div class="mini">💪 Kraft<br><span id="kraft">0</span></div>
      <div class="mini">🎁 Bonus<br><span id="bonus">0</span></div>
    </div>

  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">Übersicht</div>
    <div class="tab">Eintrag</div>
    <div class="tab">Statistik</div>
  </div>

  <!-- INPUT -->
  <div class="card">
    <h3>Eintrag hinzufügen</h3>

    <label>Datum</label>
    <input type="date" id="datum">

    <label>Person</label>
    <select id="person">
      <option>Thorsten</option>
      <option>Basti</option>
      <option>Marian</option>
      <option>Fabi</option>
    </select>

    <label>Schritte</label>
    <input type="number" id="stepsInput">

    <label>Rad KM</label>
    <input type="number" id="bikeInput">

    <label>Kniebeugen</label>
    <input type="number" id="squatInput">

    <label>Liegestütze</label>
    <input type="number" id="pushInput">

    <label>Bonus</label>
    <input type="checkbox" id="bonusInput">

    <button onclick="addEntry()">Speichern</button>
  </div>

</div>

</div>

<script>
let entries = [];

// 🔥 Punkte berechnen
function calculatePoints(e){
  return Math.floor(e.steps/1000)
    + e.bike
    + Math.floor(e.squats/5)
    + Math.floor(e.pushups/3)
    + (e.bonus ? 4 : 0);
}

// ➕ Eintrag
function addEntry(){
  const e = {
    steps: Number(stepsInput.value||0),
    bike: Number(bikeInput.value||0),
    squats: Number(squatInput.value||0),
    pushups: Number(pushInput.value||0),
    bonus: bonusInput.checked
  };
  entries.push(e);
  update();
}

// 🔄 UI aktualisieren
function update(){
  let steps = entries.reduce((a,b)=>a+b.steps,0);
  let bike = entries.reduce((a,b)=>a+b.bike,0);
  let kraft = entries.reduce((a,b)=>a+b.squats + b.pushups,0);
  let bonus = entries.filter(e=>e.bonus).length;

  let points = entries.reduce((a,b)=>a+calculatePoints(b),0);

  let goal = 1600;
  let percent = Math.round(points/goal*100);

  document.getElementById("steps").innerText = steps;
  document.getElementById("bike").innerText = bike;
  document.getElementById("kraft").innerText = kraft;
  document.getElementById("bonus").innerText = bonus;

  document.getElementById("zielText").innerText = points + " / " + goal + " Punkte";
  document.getElementById("percent").innerText = percent + "%";
  document.getElementById("bar").style.width = percent + "%";
}
</script>

</body>
</html>
