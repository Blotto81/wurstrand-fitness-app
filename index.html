<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wurstrand Challenge</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:#f8fafc;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.hero{
  background:rgba(17,24,39,.95);
  border:1px solid #334155;
  border-radius:22px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{margin:0;font-size:32px}
.sub{color:#94a3b8;margin-top:5px}

.overlay{
  margin-top:20px;
  padding:25px;
  border-radius:22px;
  background:linear-gradient(135deg,#111827,#1f2937);
  border:1px solid #475569;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:#1e293b;
  font-size:12px;
  margin-bottom:15px;
}

.progress-bar{
  height:14px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

.progress{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#84cc16);
}

.grid{
  display:grid;
  gap:15px;
  margin-top:20px;
}

.grid-4{grid-template-columns:repeat(4,1fr)}

.mini{
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  text-align:center;
}

.card{
  margin-top:25px;
  padding:25px;
  border-radius:22px;
  background:#111827;
  border:1px solid #334155;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:14px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.entry{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}

.delete{
  background:#ef4444;
  color:white;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="wrap">
<div class="hero">

<h1>🔥 Wurstrand Challenge</h1>
<div class="sub">Gemeinsam stärker. Jeden Tag.</div>

<div class="overlay">
<div class="badge">TEAM DASHBOARD</div>

<h2 id="points">0 / 1700 Punkte</h2>
<div id="percent">0%</div>

<div class="progress-bar">
<div id="bar" class="progress" style="width:0%"></div>
</div>

<div class="grid grid-4">
<div class="mini">👣<br><span id="steps">0</span></div>
<div class="mini">🚴<br><span id="bike">0</span></div>
<div class="mini">💪<br><span id="kraft">0</span></div>
<div class="mini">🎁<br><span id="bonus">0</span></div>
</div>
</div>

<div class="card">
<h3>Neuen Eintrag hinzufügen</h3>

<input type="date" id="date">

<select id="person">
<option>Thorsten</option>
<option>Basti</option>
<option>Marian</option>
<option>Fabi</option>
</select>

<input type="number" id="stepsInput" placeholder="Schritte">
<input type="number" id="bikeInput" placeholder="Rad KM">
<input type="number" id="squatInput" placeholder="Kniebeugen">
<input type="number" id="pushInput" placeholder="Liegestütze">

<label>
<input type="checkbox" id="bonusInput">
Bonus
</label>

<button onclick="addEntry()">Speichern</button>
</div>

<div class="card">
<h3>Gemeinsame Einträge</h3>
<div id="entries"></div>
</div>

</div>
</div>

<script>
const supabaseUrl = "https://ythcpltiujpnxedtgjmr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0aGNwbHRpdWpwbnhlZHRnam1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDk3NTAsImV4cCI6MjA5MjY4NTc1MH0.UfT5EwyMU_-CciwdfRP7AN7-5jMO_UCbwrz_vT8DNpo";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("date").value = new Date().toISOString().slice(0,10);

function calc(e){
  return Math.floor((e.steps || 0) / 1000)
    + (e.bike || 0)
    + Math.floor((e.squats || 0) / 5)
    + Math.floor((e.pushups || 0) / 3)
    + (e.bonus ? 4 : 0);
}

async function loadEntries() {
  const { data, error } = await supabase
    .from("entries")
    .select("*")
    .order("date", { ascending: false });

  if (error) {
    alert("Fehler beim Laden: " + error.message);
    return;
  }

  updateDashboard(data || []);
  renderEntries(data || []);
}

function updateDashboard(data){
  let steps = data.reduce((a,b)=>a+(b.steps||0),0);
  let bike = data.reduce((a,b)=>a+(b.bike||0),0);
  let kraft = data.reduce((a,b)=>a+(b.squats||0)+(b.pushups||0),0);
  let bonus = data.filter(e=>e.bonus).length;
  let pts = data.reduce((a,b)=>a+calc(b),0);

  let goal = 1700;
  let percent = Math.round((pts / goal) * 100);

  document.getElementById("steps").innerText = steps.toLocaleString("de-DE");
  document.getElementById("bike").innerText = bike.toFixed(1).replace(".", ",");
  document.getElementById("kraft").innerText = kraft.toLocaleString("de-DE");
  document.getElementById("bonus").innerText = bonus;
  document.getElementById("points").innerText = pts.toFixed(1).replace(".", ",") + " / " + goal + " Punkte";
  document.getElementById("percent").innerText = percent + "%";
  document.getElementById("bar").style.width = Math.min(percent,100) + "%";
}

function renderEntries(data){
  const box = document.getElementById("entries");

  if (!data.length) {
    box.innerHTML = "<p style='color:#94a3b8'>Noch keine Einträge.</p>";
    return;
  }

  box.innerHTML = data.map(e => `
    <div class="entry">
      <strong>${e.person}</strong> · ${e.date}<br>
      👣 ${e.steps || 0} Schritte · 🚴 ${e.bike || 0} km · 💪 ${(e.squats || 0) + (e.pushups || 0)} · 🎁 ${e.bonus ? "Ja" : "Nein"}<br>
      Punkte: ${calc(e).toFixed(1).replace(".", ",")}
      <button class="delete" onclick="deleteEntry('${e.id}')">Löschen</button>
    </div>
  `).join("");
}

async function addEntry(){
  const entry = {
    date: document.getElementById("date").value,
    person: document.getElementById("person").value,
    steps: Number(document.getElementById("stepsInput").value || 0),
    bike: Number(document.getElementById("bikeInput").value || 0),
    squats: Number(document.getElementById("squatInput").value || 0),
    pushups: Number(document.getElementById("pushInput").value || 0),
    bonus: document.getElementById("bonusInput").checked
  };

  const { error } = await supabase
    .from("entries")
    .insert([entry]);

  if (error) {
    alert("Fehler beim Speichern: " + error.message);
    return;
  }

  document.getElementById("stepsInput").value = "";
  document.getElementById("bikeInput").value = "";
  document.getElementById("squatInput").value = "";
  document.getElementById("pushInput").value = "";
  document.getElementById("bonusInput").checked = false;

  await loadEntries();
}

async function deleteEntry(id){
  if (!confirm("Diesen Eintrag wirklich löschen?")) return;

  const { error } = await supabase
    .from("entries")
    .delete()
    .eq("id", id);

  if (error) {
    alert("Fehler beim Löschen: " + error.message);
    return;
  }

  await loadEntries();
}

loadEntries();
</script>

</body>
</html>
